name: ci

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.25.x']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: Go vet
        run: go vet ./...
      - name: Go test
        run: go test ./...
      - name: Race tests
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export CGO_ENABLED=1
          go test -race -count=1 ./...
      - name: RAG tests
        run: go test -tags rag ./internal/rag/...

